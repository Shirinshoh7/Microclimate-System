version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: diplom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iot_diplom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: *****
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iot_diplom"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diplom_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: iot_diplom
      DB_USER: postgres
      DB_PASSWORD: *****
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ngrok:
    image: ngrok/ngrok:latest
    container_name: diplom_ngrok
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=3C9jBvCoWSeAoJM1JpSnYZ8IrkW_6SzKhEb5KJAJCsNFABtSi
    command: 
      - "http"
      - "--url=glorifier-pecan-applicant.ngrok-free.dev"
      - "backend:8000"

volumes:
  postgres_data: